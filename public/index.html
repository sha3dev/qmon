<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QMON v1 Dashboard</title>
  <style>
    :root {
      --bg: #0c1117;
      --panel: #121b24;
      --panel-strong: #182534;
      --border: #294055;
      --text: #edf6ff;
      --muted: #8ca4bc;
      --positive: #3ed598;
      --negative: #ff7b72;
      --accent: #f4b942;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Iosevka", "IBM Plex Mono", monospace;
      background:
        radial-gradient(circle at top right, rgba(244, 185, 66, 0.12), transparent 25%),
        linear-gradient(180deg, #081018 0%, #0c1117 100%);
      color: var(--text);
    }
    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card, .market-card {
      background: linear-gradient(180deg, rgba(24, 37, 52, 0.96), rgba(18, 27, 36, 0.96));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }
    .summary-label, .market-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .summary-value {
      display: block;
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .market-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .market-title {
      margin: 6px 0 0;
      font-size: 18px;
      text-transform: uppercase;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .pill.champion { color: var(--positive); border-color: rgba(62, 213, 152, 0.45); }
    .pill.inactive { color: var(--negative); border-color: rgba(255, 123, 114, 0.45); }
    .market-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .market-metric {
      padding: 12px;
      border-radius: 12px;
      background: rgba(9, 15, 22, 0.78);
      border: 1px solid rgba(41, 64, 85, 0.55);
    }
    .market-metric strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
    }
    .window-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .window-pill {
      min-width: 48px;
      padding: 8px 10px;
      text-align: center;
      border-radius: 10px;
      font-size: 12px;
      background: rgba(9, 15, 22, 0.78);
      border: 1px solid rgba(41, 64, 85, 0.55);
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 720px) {
      .hero { flex-direction: column; align-items: start; }
      .market-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <div class="market-label">Preset QMON Runtime</div>
        <h1>QMON v1</h1>
        <p>One preset-only QMON per market. The current champion is the market QMON with a positive summed paper PnL across the last 5 completed windows.</p>
      </div>
      <a class="pill" href="/signals.html">Signals view</a>
    </section>

    <section id="summary" class="summary"></section>
    <section id="markets" class="market-grid"></section>
    <div class="footer-note" id="footer-note">Waiting for runtime payload…</div>
  </main>

  <script>
    const summaryElement = document.getElementById("summary");
    const marketsElement = document.getElementById("markets");
    const footerNoteElement = document.getElementById("footer-note");

    function formatNumber(value) {
      return Number(value || 0).toFixed(2);
    }

    function formatWindowPnl(windowPnl) {
      const className = windowPnl > 0 ? "positive" : windowPnl < 0 ? "negative" : "";
      return `<div class="window-pill ${className}">${formatNumber(windowPnl)}</div>`;
    }

    function renderSummary(payload) {
      const populations = payload.populations || [];
      const championCount = populations.filter((population) => population.activeChampionQmonId !== null).length;
      const totalRecentPnl = populations.reduce((runningPnl, population) => {
        const marketQmon = population.qmons?.[0];
        return runningPnl + (marketQmon?.metrics?.recentWindowPnlSum || 0);
      }, 0);

      summaryElement.innerHTML = [
        ["Mode", payload.mode || "paper"],
        ["Markets", populations.length],
        ["Champions", championCount],
        ["Recent 5W PnL", formatNumber(totalRecentPnl)],
      ].map(([label, value]) => `
        <article class="summary-card">
          <div class="summary-label">${label}</div>
          <span class="summary-value">${value}</span>
        </article>
      `).join("");
    }

    function renderMarkets(payload) {
      const populations = payload.populations || [];
      marketsElement.innerHTML = populations.map((population) => {
        const marketQmon = population.qmons?.[0];
        const recentWindowPnls = marketQmon?.metrics?.recentWindowPnls || [];
        const isChampion = population.activeChampionQmonId === marketQmon?.id;
        const statusLabel = isChampion ? "active champion" : marketQmon?.metrics?.isActive ? "active / no champion" : "inactive";
        const statusClass = isChampion ? "champion" : marketQmon?.metrics?.isActive ? "" : "inactive";

        return `
          <article class="market-card">
            <div class="market-head">
              <div>
                <div class="market-label">${marketQmon?.strategyName || "Late Trend Reverse"}</div>
                <h2 class="market-title">${population.market}</h2>
              </div>
              <span class="pill ${statusClass}">${statusLabel}</span>
            </div>
            <div class="market-meta">
              <div class="market-metric">
                <span class="market-label">Trend</span>
                <strong>${population.currentTrend || "FLAT"}</strong>
              </div>
              <div class="market-metric">
                <span class="market-label">Recent 5W PnL</span>
                <strong class="${(marketQmon?.metrics?.recentWindowPnlSum || 0) >= 0 ? "positive" : "negative"}">${formatNumber(marketQmon?.metrics?.recentWindowPnlSum || 0)}</strong>
              </div>
              <div class="market-metric">
                <span class="market-label">Paper Position</span>
                <strong>${marketQmon?.currentPaperPosition?.action || "flat"}</strong>
              </div>
              <div class="market-metric">
                <span class="market-label">Real Seat</span>
                <strong>${population.realSeat?.route === "real" && population.realSeat?.hasOpenPosition ? population.realSeat.action : population.realSeat?.route || "paper"}</strong>
              </div>
            </div>
            <div class="window-strip">${recentWindowPnls.map(formatWindowPnl).join("")}</div>
          </article>
        `;
      }).join("");
    }

    async function refreshDashboard() {
      const response = await fetch("/api/qmons");
      const payload = await response.json();

      renderSummary(payload);
      renderMarkets(payload);
      footerNoteElement.textContent = `Last update ${new Date(payload.generatedAt).toLocaleTimeString()}`;
    }

    refreshDashboard();
    setInterval(refreshDashboard, 2000);
  </script>
</body>
</html>
