<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Quant — Signal Dashboard</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #222636;
      --bg-card-hover: #2a2f45;
      --border: #2d3148;
      --text-primary: #e4e6f0;
      --text-secondary: #8b8fa3;
      --text-muted: #5e6175;
      --green-strong: #00e676;
      --green-mid: #66bb6a;
      --green-faint: #2e4a3e;
      --red-strong: #ff1744;
      --red-mid: #ef5350;
      --red-faint: #4a2e2e;
      --neutral: #455a64;
      --accent: #7c4dff;
      --accent-dim: rgba(124,77,255,0.15);
      --yellow: #ffd740;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      background: var(--bg-primary); color: var(--text-primary);
      font-size: 12px; line-height: 1.4; min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
    .header .status { font-size: 11px; color: var(--text-secondary); }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot-live { background: var(--green-strong); animation: pulse 2s infinite; }
    .dot-off { background: var(--red-strong); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Dashboard layout */
    .dashboard { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Asset card */
    .asset-card {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .asset-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .asset-head-left { display: flex; align-items: center; gap: 10px; }
    .asset-sym { font-size: 15px; font-weight: 700; text-transform: uppercase; color: var(--accent); }
    .price-tag { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .price-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

    /* Asset signals section */
    .asset-signals { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .section-label {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px;
    }
    .sig-grid { display: grid; gap: 4px; }
    .sig-grid-asset { grid-template-columns: repeat(5, 1fr); }
    .sig-grid-window { grid-template-columns: repeat(5, 1fr); }

    /* Signal cell */
    .sig-cell {
      background: var(--bg-card); border-radius: 4px; padding: 5px 6px;
      text-align: center; border: 1px solid transparent;
      transition: all 0.2s ease; cursor: pointer; position: relative;
    }
    .sig-cell:hover { border-color: var(--accent); background: var(--bg-card-hover); }
    .sig-name {
      font-size: 8px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 2px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .sig-val { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .sig-bar { margin-top: 2px; height: 2px; border-radius: 1px; background: var(--border); position: relative; overflow: hidden; }
    .sig-bar-fill { position: absolute; top: 0; height: 100%; border-radius: 1px; transition: all 0.3s ease; }
    .sig-null { color: var(--text-muted); font-style: italic; font-size: 10px; }

    /* Horizon row (velocity/momentum/meanReversion) */
    .horizon-row {
      background: var(--bg-card); border-radius: 4px; padding: 5px 8px;
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease;
    }
    .horizon-row:hover { border-color: var(--accent); background: var(--bg-card-hover); }
    .horizon-row-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .horizon-chips { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
    .h-chip {
      font-size: 9px; padding: 1px 5px; border-radius: 2px;
      font-weight: 600; font-variant-numeric: tabular-nums;
    }

    /* Window panels */
    .windows-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
    .win-panel { background: var(--bg-secondary); padding: 10px 14px; }
    .win-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .win-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .win-progress { margin-top: 6px; margin-bottom: 4px; }
    .win-progress-track { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .win-progress-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }
    .win-progress-info { display: flex; justify-content: space-between; margin-top: 2px; font-size: 9px; color: var(--text-muted); }
    .win-prices { display: flex; gap: 10px; }
    .win-price { font-size: 10px; }
    .win-price-label { color: var(--text-muted); }
    .win-price-val { font-weight: 600; }
    .up-color { color: var(--green-mid); }
    .down-color { color: var(--red-mid); }

    /* Info bar */
    .info-bar {
      display: flex; align-items: center; justify-content: center;
      padding: 8px; font-size: 10px; color: var(--text-muted); gap: 16px;
    }
    .info-bar span { opacity: 0.7; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-card {
      background: var(--bg-secondary); border: 1px solid var(--accent);
      border-radius: 10px; max-width: 480px; width: 90%; max-height: 80vh;
      overflow-y: auto; padding: 20px; position: relative;
    }
    .modal-close {
      position: absolute; top: 10px; right: 14px; background: none; border: none;
      color: var(--text-muted); font-size: 18px; cursor: pointer;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .modal-id { font-size: 10px; color: var(--text-muted); margin-bottom: 12px; }
    .modal-section { margin-bottom: 10px; }
    .modal-section-title { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
    .modal-text { font-size: 12px; color: var(--text-primary); line-height: 1.5; }
    .modal-range { display: inline-block; padding: 2px 8px; border-radius: 3px; background: var(--accent-dim); color: var(--accent); font-weight: 600; font-size: 11px; }

    /* Trigger badges */
    .trigger-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; margin-left: 8px; }
    .trigger-badge {
      display: inline-block; font-size: 8px; padding: 2px 7px; border-radius: 3px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
      animation: trigger-pop 8s ease-out forwards; white-space: nowrap;
      cursor: pointer; transition: filter 0.15s ease;
      -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
    }
    .trigger-badge:hover { filter: brightness(1.1); }
    .trigger-critical { background: var(--red-faint); color: var(--red-mid); border: 1px solid var(--red-mid); }
    .trigger-warning { background: rgba(234,179,8,0.12); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
    .trigger-info { background: rgba(59,130,246,0.12); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
    @keyframes trigger-pop {
      0% { opacity: 0; }
      5% { opacity: 1; }
      10% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Regime badges */
    .regime-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; margin-left: 8px; }
    .regime-badge {
      display: inline-block; font-size: 8px; padding: 2px 6px; border-radius: 2px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap; cursor: pointer; transition: filter 0.15s ease;
      -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
    }
    .regime-badge:hover { filter: brightness(1.15); }
    .regime-direction-up { background: rgba(0,230,118,0.15); color: var(--green-mid); }
    .regime-direction-down { background: var(--red-faint); color: var(--red-mid); }
    .regime-direction-flat { background: rgba(69,90,100,0.2); color: var(--text-secondary); }
    .regime-vol-high { background: rgba(255,215,64,0.15); color: var(--yellow); }
    .regime-vol-normal { background: rgba(124,77,255,0.1); color: var(--accent); }
    .regime-vol-low { background: rgba(69,90,100,0.2); color: var(--text-muted); }
  </style>
</head>
<body x-data="dashboard()" x-init="start()">

  <div class="header">
    <h1>POLYMARKET QUANT — SIGNALS + REGIMES</h1>
    <div class="status">
      <span class="dot" :class="connected ? 'dot-live' : 'dot-off'"></span>
      <span x-text="connected ? 'LIVE' : 'OFFLINE'"></span>
      <span style="margin-left:12px; color: var(--text-muted);" x-text="lastUpdate"></span>
    </div>
  </div>

  <div class="dashboard">
    <template x-for="asset in assets" :key="asset">
      <div class="asset-card">

        <!-- Asset header with Chainlink price + triggers -->
        <div class="asset-head">
          <div class="asset-head-left">
            <span class="asset-sym" x-text="asset.toUpperCase()"></span>
            <span class="price-tag" x-text="fmtPrice(getChainlink(asset))"></span>
            <span class="price-label">Chainlink</span>
            <span class="regime-badges">
              <span class="regime-badge" :class="regimeDirectionClass(asset)" x-text="regimeDirectionLabel(asset)" @click.stop="openRegimeInfo(asset, 'direction')"></span>
              <span class="regime-badge" :class="regimeVolatilityClass(asset)" x-text="regimeVolatilityLabel(asset)" @click.stop="openRegimeInfo(asset, 'volatility')"></span>
            </span>
            <span class="trigger-badges">
              <template x-for="t in getAssetTriggers(asset)" :key="t.key">
                <span class="trigger-badge" :class="'trigger-' + t.severity" x-text="t.label" @click.stop="openTriggerInfo(t.id)"></span>
              </template>
            </span>
          </div>
        </div>

        <!-- Asset-level signals -->
        <div class="asset-signals">
          <div class="section-label">Asset Signals (all windows)</div>
          <div class="sig-grid sig-grid-asset">

            <!-- Scalar asset signals -->
            <template x-for="sig in assetScalarSignals" :key="sig.key">
              <div class="sig-cell" :style="cellBg(getAssetVal(asset, sig.key))"
                   @click="openInfo(sig.key)">
                <div class="sig-name" x-text="sig.label"></div>
                <template x-if="getAssetVal(asset, sig.key) !== null">
                  <div>
                    <div class="sig-val" :style="'color:'+valColor(getAssetVal(asset, sig.key))"
                         x-text="fmt(getAssetVal(asset, sig.key))"></div>
                    <div class="sig-bar"><div class="sig-bar-fill" :style="barStyle(getAssetVal(asset, sig.key))"></div></div>
                  </div>
                </template>
                <template x-if="getAssetVal(asset, sig.key) === null">
                  <div class="sig-null">&mdash;</div>
                </template>
              </div>
            </template>

            <!-- Multi-horizon signals: velocity, momentum, meanReversion (same row) -->
            <div class="horizon-row-group" style="grid-column: span 5;">
              <template x-for="mh in multiHorizonSignals" :key="mh.key">
                <div class="horizon-row" @click="openInfo(mh.key)">
                  <div class="sig-name" style="text-align:center; margin-bottom:3px;" x-text="mh.label"></div>
                  <div class="horizon-chips">
                    <template x-for="h in getHorizonKeys(asset, mh.key)" :key="mh.key+h">
                      <span class="h-chip" :style="chipStyle(getAssetHorizon(asset, mh.key, h))">
                        <span x-text="h"></span>: <span x-text="fmt(getAssetHorizon(asset, mh.key, h))"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Window-level panels -->
        <div class="windows-row">
          <template x-for="win in windows" :key="win">
            <div class="win-panel">
              <div class="win-head">
                <span class="win-label">
                  <span x-text="win + ' Market'"></span>
                  <span class="trigger-badges" style="vertical-align: middle;">
                    <template x-for="t in getWindowTriggers(asset, win)" :key="t.key">
                      <span class="trigger-badge" :class="'trigger-' + t.severity" x-text="t.label" @click.stop="openTriggerInfo(t.id)"></span>
                    </template>
                  </span>
                </span>
                <div class="win-prices">
                  <span class="win-price">
                    <span class="win-price-label">Beat </span>
                    <span class="win-price-val" x-text="fmtPrice(getWinPrice(asset, win, 'priceToBeat'))"></span>
                  </span>
                  <span class="win-price">
                    <span class="win-price-label">Up </span>
                    <span class="win-price-val up-color" x-text="fmtToken(getWinPrice(asset, win, 'upPrice'))"></span>
                  </span>
                  <span class="win-price">
                    <span class="win-price-label">Dn </span>
                    <span class="win-price-val down-color" x-text="fmtToken(getWinPrice(asset, win, 'downPrice'))"></span>
                  </span>
                </div>
              </div>
              <div class="win-progress">
                <div class="win-progress-track">
                  <div class="win-progress-fill" :style="progressStyle(asset, win)"></div>
                </div>
                <div class="win-progress-info">
                  <span x-text="progressPct(asset, win)"></span>
                  <span x-text="timeRemaining(asset, win)"></span>
                </div>
              </div>
              <div class="sig-grid sig-grid-window">
                <template x-for="sig in windowSignals" :key="sig.key">
                  <div class="sig-cell" :style="cellBg(getWinVal(asset, win, sig.key))"
                       @click="openInfo(sig.key)">
                    <div class="sig-name" x-text="sig.label"></div>
                    <template x-if="getWinVal(asset, win, sig.key) !== null">
                      <div>
                        <div class="sig-val" :style="'color:'+valColor(getWinVal(asset, win, sig.key))"
                             x-text="fmt(getWinVal(asset, win, sig.key))"></div>
                        <div class="sig-bar"><div class="sig-bar-fill" :style="barStyle(getWinVal(asset, win, sig.key))"></div></div>
                      </div>
                    </template>
                    <template x-if="getWinVal(asset, win, sig.key) === null">
                      <div class="sig-null">&mdash;</div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

      </div>
    </template>
  </div>

  <div class="info-bar">
    <span>Polling: 1s</span>
    <span>Signals: 18</span>
    <span>Regimes: 2</span>
    <span>Assets: <span x-text="assets.length"></span></span>
    <span>Windows: <span x-text="windows.length"></span></span>
  </div>

  <!-- Signal info modal -->
  <template x-if="modalKey">
    <div class="modal-overlay" @click.self="modalKey = null">
      <div class="modal-card">
        <button class="modal-close" @click="modalKey = null">&times;</button>
        <div class="modal-title" x-text="getModalInfo()?.name || modalKey"></div>
        <div class="modal-id" x-text="getModalInfo()?.id || ''"></div>

        <div class="modal-section">
          <div class="modal-section-title">Description</div>
          <div class="modal-text" x-text="getModalInfo()?.desc || ''"></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Why it matters</div>
          <div class="modal-text" x-text="getModalInfo()?.why || ''"></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">How to interpret</div>
          <div class="modal-text" x-text="getModalInfo()?.interpret || ''"></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Normalization</div>
          <div class="modal-text"><span class="modal-range" x-text="getModalInfo()?.range || '[-1, 1]'"></span> <span x-text="getModalInfo()?.norm || ''"></span></div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Level</div>
          <div class="modal-text" x-text="getModalInfo()?.level || ''"></div>
        </div>
        <div class="modal-section" x-show="modalType === 'regime' && getModalInfo()?.currentValue !== null">
          <div class="modal-section-title">Current Value</div>
          <div class="modal-text">
            <span class="modal-range" x-text="getModalInfo()?.asset?.toUpperCase() || ''"></span>
            <span>: </span>
            <span x-text="getModalInfo()?.currentValue || ''"></span>
          </div>
        </div>
        <div class="modal-section" x-show="modalType === 'regime' && getModalInfo()?.thresholds">
          <div class="modal-section-title">Thresholds</div>
          <div class="modal-text" x-text="getModalInfo()?.thresholds || ''"></div>
        </div>
      </div>
    </div>
  </template>

  <script>
    function dashboard() {
      return {
        data: {},
        activeTriggers: [],
        connected: false,
        lastUpdate: '',
        modalKey: null,
        modalType: 'signal',
        modalAsset: null,
        assets: ['btc', 'eth', 'sol', 'xrp'],
        windows: ['5m', '15m'],

        assetScalarSignals: [
          { key: 'oracleLag',          label: 'ORC-LAG' },
          { key: 'dispersion',         label: 'DISP' },
          { key: 'imbalance',          label: 'IMB' },
          { key: 'microprice',         label: 'MPRICE' },
          { key: 'staleness',          label: 'STALE' },
          { key: 'acceleration',       label: 'ACCEL' },
          { key: 'volatilityRegime',   label: 'VOL-REG' },
          { key: 'spread',             label: 'SPREAD' },
          { key: 'bookDepth',          label: 'DEPTH' },
          { key: 'crossAssetMomentum', label: 'X-ASSET' },
        ],

        multiHorizonSignals: [
          { key: 'velocity',      label: 'VELOCITY' },
          { key: 'momentum',      label: 'MOMENTUM' },
          { key: 'meanReversion', label: 'MEAN REV' },
        ],

        windowSignals: [
          { key: 'distance',         label: 'DISTANCE' },
          { key: 'zScore',           label: 'Z-SCORE' },
          { key: 'edge',             label: 'EDGE' },
          { key: 'tokenPressure',    label: 'TK-PRESS' },
          { key: 'marketEfficiency', label: 'MKT-EFF' },
        ],

        sigInfo: {
          distance:         { id: 'S1', name: 'Distance to Beat', desc: 'Signed percentage distance between the current Chainlink price and the Price to Beat. Positive means Chainlink is above the strike (Up winning).', why: 'The market resolves by comparing the final Chainlink price to the Price to Beat. This is the most fundamental signal.', interpret: 'Positive = Up is currently winning. Negative = Down is winning. Magnitude shows how far from the strike.', norm: 'via tanh of percentage distance', range: '[-1, 1]', level: 'Window-level (depends on Price to Beat)' },
          zScore:           { id: 'S2', name: 'Z-Score (time/vol adjusted)', desc: 'Distance to beat normalized by remaining time and recent volatility. Converts raw distance into a probability-like score.', why: 'A small lead with 5 seconds left is very different from a small lead with 5 minutes left. This signal adjusts for that.', interpret: 'Strong positive = high mechanical probability of Up. Strong negative = high probability of Down. Near zero = too close to call.', norm: 'logistic function of z-statistic', range: '[-1, 1]', level: 'Window-level (uses market_end, price_to_beat)' },
          velocity:         { id: 'S3', name: 'Price Velocity (multi-horizon)', desc: 'Rate of Chainlink price change measured at 30s, 2m, and 5m lookback windows. Shows if price is trending.', why: 'In short windows, recent momentum often persists. Comparing horizons reveals trend structure: all-positive = strong trend, mixed = uncertain.', interpret: 'Positive = price rising. Negative = price falling. Compare horizons: short > long = accelerating trend.', norm: 'tanh of normalized price change per second', range: '[-1, 1] per horizon', level: 'Asset-level (Chainlink price only)' },
          oracleLag:        { id: 'S4', name: 'Oracle Lag', desc: 'Direction and magnitude of the gap between exchange consensus price and Chainlink. Shows if the oracle is behind.', why: 'Chainlink resolves the market. If exchanges already moved but Chainlink hasn\'t caught up, the next Chainlink update is predictable.', interpret: 'Positive = exchanges above Chainlink (expect Chainlink to move up). Negative = exchanges below (expect down move).', norm: 'tanh of relative price difference', range: '[-1, 1]', level: 'Asset-level (uses all exchange prices + Chainlink)' },
          dispersion:       { id: 'S5', name: 'Exchange Dispersion', desc: 'How much exchanges disagree on price. High dispersion = noisy, uncertain market. Low = consensus.', why: 'When exchanges diverge, any directional signal is less reliable. Use as a confidence filter.', interpret: 'Near 0 = exchanges agree (high confidence). Near 1 = wide disagreement (reduce position size, distrust other signals).', norm: 'normalized range / consensus', range: '[0, 1]', level: 'Asset-level (exchange prices)' },
          imbalance:        { id: 'S6', name: 'Order Book Imbalance', desc: 'Ratio of bid vs ask volume at the top of exchange order books. Shows short-term directional pressure.', why: 'Heavy bids relative to asks predict upward micro-moves. Well-documented in market microstructure literature.', interpret: 'Positive = more bid pressure (bullish). Negative = more ask pressure (bearish). Near zero = balanced.', norm: '(bidSize - askSize) / (bidSize + askSize)', range: '[-1, 1]', level: 'Asset-level (exchange order books)' },
          microprice:       { id: 'S7', name: 'Microprice Deviation', desc: 'Size-weighted "fair price" vs simple midpoint. Predicts the direction of the next tick.', why: 'The microprice is a better estimator of the next trade price than the midpoint. Deviation signals imminent movement.', interpret: 'Positive = microprice above mid (next tick likely up). Negative = below mid (next tick likely down).', norm: 'tanh of deviation scaled by spread', range: '[-1, 1]', level: 'Asset-level (exchange order books)' },
          edge:             { id: 'S8', name: 'Model Edge', desc: 'Difference between your estimated probability of Up (mechanical model) and the market-implied probability (token price).', why: 'This is the core trading signal: positive edge means the token is underpriced relative to your model. No edge = no trade.', interpret: 'Positive = Up token is cheap (buy opportunity). Negative = Up token is expensive. Magnitude = size of opportunity.', norm: 'tanh of (model_prob - market_prob)', range: '[-1, 1]', level: 'Window-level (uses token prices + model)' },
          tokenPressure:    { id: 'S9', name: 'Token Pressure', desc: 'Imbalance between Up and Down token order books on Polymarket. Shows crowd positioning.', why: 'Token book imbalance reveals how the crowd is betting. Heavy Up bids = bullish sentiment.', interpret: 'Positive = more demand for Up tokens. Negative = more demand for Down tokens.', norm: 'relative imbalance Up vs Down books', range: '[-1, 1]', level: 'Window-level (Polymarket token books)' },
          staleness:        { id: 'S10', name: 'Feed Staleness', desc: 'Relative age of Chainlink vs exchange data feeds. Shows which feed is leading and which is lagging.', why: 'If Chainlink is stale but exchanges moved, Chainlink will likely catch up. Essential for timing.', interpret: 'Positive = Chainlink is staler than exchanges (expect catch-up). Negative = Chainlink is fresher.', norm: 'tanh of normalized time difference', range: '[-1, 1]', level: 'Asset-level (event timestamps)' },
          momentum:         { id: 'S11', name: 'Momentum (multi-horizon)', desc: 'EMA crossover signal at multiple time scales. Fast EMA vs slow EMA reveals trend persistence.', why: 'Unlike velocity (raw change), momentum measures whether a trend is sustained. Positive crossover = persistent uptrend.', interpret: 'Positive = fast EMA above slow (uptrend). Negative = below (downtrend). Compare horizons for trend confirmation.', norm: 'tanh of crossover percentage', range: '[-1, 1] per horizon', level: 'Asset-level (Chainlink price series)' },
          acceleration:     { id: 'S12', name: 'Acceleration', desc: 'Second derivative of price: is the momentum increasing or decreasing? Detects inflection points.', why: 'Acceleration turns negative before momentum does. Early warning of trend exhaustion or reversal.', interpret: 'Positive = trend strengthening. Negative = trend weakening. Zero crossing = inflection point.', norm: 'tanh of velocity difference', range: '[-1, 1]', level: 'Asset-level (Chainlink price series)' },
          volatilityRegime: { id: 'S13', name: 'Volatility Regime', desc: 'Ratio of short-term (20s) to long-term (2m) realized volatility. Detects breakout vs consolidation.', why: 'In expansion regimes, directional signals are stronger. In contraction, mean-reversion dominates.', interpret: 'Positive = vol expanding (breakout regime, trust momentum). Negative = vol contracting (mean-reversion regime).', norm: 'tanh of (ratio - 1)', range: '[-1, 1]', level: 'Asset-level (Chainlink price series)' },
          meanReversion:    { id: 'S14', name: 'Mean Reversion (multi-horizon)', desc: 'Bollinger-band z-score at multiple windows. Measures how far price is from its rolling mean.', why: 'Counter-trend signal: when price is far from its mean, statistical reversion becomes more likely. Combine with vol regime.', interpret: 'Positive = price above mean (overextended up, expect pullback). Negative = below mean (expect bounce). Best when vol regime is contracting.', norm: 'tanh of clamped z-score', range: '[-1, 1] per horizon', level: 'Asset-level (Chainlink price series)' },
          spread:           { id: 'S15', name: 'Exchange Spread', desc: 'Average normalized bid-ask spread across exchanges. Measures liquidity and market-maker confidence.', why: 'Wide spreads signal uncertainty, illiquidity, or imminent volatility. Narrow spreads = stable, confident market.', interpret: 'Near 0 = very tight spread (liquid, stable). Near 1 = wide spread (illiquid, volatile). Use as risk filter.', norm: 'tanh of average spread percentage', range: '[0, 1]', level: 'Asset-level (exchange order books)' },
          bookDepth:        { id: 'S16', name: 'Book Depth', desc: 'Total liquidity at top of book across exchanges. Deep books resist price movement; thin books amplify it.', why: 'A thin book means even small orders can move price significantly. Critical for assessing price stability.', interpret: 'Near 0 = empty books (fragile, volatile). Near 1 = deep books (stable, resistant to moves).', norm: 'tanh of average depth / baseline', range: '[0, 1]', level: 'Asset-level (exchange order books)' },
          marketEfficiency:  { id: 'S17', name: 'Market Efficiency', desc: 'Deviation of (Up price + Down price) from 1.0. In efficient binary markets, they should sum to exactly 1.', why: 'Deviation from 1.0 reveals arbitrage opportunity or stale quotes. Validates whether market pricing is trustworthy.', interpret: 'Near 0 = efficient market (pricing reliable). Positive = overpriced (sum > 1). Negative = underpriced (sum < 1).', norm: 'tanh of deviation from 1.0', range: '[-1, 1]', level: 'Window-level (Polymarket token prices)' },
          crossAssetMomentum: { id: 'S18', name: 'Cross-Asset Momentum', desc: 'For alts: BTC return as leading indicator. For BTC: average alt return as confirmation signal.', why: 'BTC dominates crypto. Its moves propagate to alts with a delay. For BTC, alt confirmation validates the move.', interpret: 'Positive = peer assets moving up (bullish contagion). Negative = peers moving down.', norm: 'tanh of peer return', range: '[-1, 1]', level: 'Asset-level (all configured asset prices)' },
        },

        triggerInfo: {
          'consensus-flip':      { id: 'T1', name: 'Consensus Flip', desc: 'The Up token crossed the 0.50 level, so the market consensus flipped from Down-favored to Up-favored, or vice versa.', why: 'Crossing 0.50 is a meaningful regime change in binary markets because the implied winner changed.', interpret: 'Treat this as a narrative shift, not an entry by itself. Stronger when confirmed by momentum or oracle lag.', norm: 'fires on a level crossing at 0.50', range: 'transition event', level: 'Window-level trigger' },
          'momentum-shift':      { id: 'T2', name: 'Momentum Shift', desc: 'The net sign across momentum horizons changed direction, indicating a broad shift in trend persistence.', why: 'A multi-horizon flip is more informative than a single noisy momentum tick.', interpret: 'Bullish shift means trend confirmation turned positive across horizons; bearish means the opposite.', norm: 'fires on a sign flip of aggregated momentum horizons', range: 'transition event', level: 'Asset-level trigger' },
          breakout:              { id: 'T3', name: 'Breakout', desc: 'The distance-to-beat signal crossed the breakout threshold, meaning the market moved decisively away from the strike.', why: 'Once the market breaks away from the strike, binary pricing often reprices quickly.', interpret: 'Use it as structural confirmation that the market is no longer hovering around the decision boundary.', norm: 'fires when |distance| crosses the breakout threshold', range: 'transition event', level: 'Window-level trigger' },
          'book-pressure':       { id: 'T4', name: 'Book Pressure', desc: 'Exchange order book imbalance crossed a strong threshold, showing a meaningful shift in buy or sell pressure.', why: 'Large top-of-book imbalance often precedes short-term price movement.', interpret: 'Positive pressure favors upside continuation; negative pressure favors downside continuation.', norm: 'fires when |imbalance| crosses the pressure threshold', range: 'transition event', level: 'Asset-level trigger' },
          'acceleration-spike':  { id: 'T5', name: 'Acceleration Spike', desc: 'Price acceleration moved through a meaningful threshold, indicating that the trend is suddenly strengthening or reversing faster.', why: 'Acceleration tends to change before slower trend signals fully react.', interpret: 'Useful as an early warning trigger. Best combined with momentum or breakout confirmation.', norm: 'fires when |acceleration| crosses the spike threshold', range: 'transition event', level: 'Asset-level trigger' },
          mispricing:            { id: 'T6', name: 'Mispricing', desc: 'The edge signal crossed a threshold large enough to indicate a notable gap between model value and market price.', why: 'This is the clearest direct trading-style trigger because it flags potential valuation mismatch.', interpret: 'Positive edge means Up may be underpriced; negative edge means Up may be overpriced.', norm: 'fires when |edge| crosses the mispricing threshold', range: 'transition event', level: 'Window-level trigger' },
          'time-decay':          { id: 'T7', name: 'Time Decay', desc: 'The market is late in its window while still close to the strike, creating a compressed and unstable endgame.', why: 'Late unresolved markets can move abruptly because a small price change has an outsized effect on settlement odds.', interpret: 'This is a cautionary trigger: expect sharper repricing and more sensitivity to the next oracle move.', norm: 'fires when progress is high and distance remains small', range: 'transition event', level: 'Window-level trigger' },
          'reversion-extreme':   { id: 'T8', name: 'Reversion Extreme', desc: 'At least one mean-reversion horizon reached an extreme reading, suggesting the move may be overextended.', why: 'Overextension can precede pullbacks, especially outside breakout regimes.', interpret: 'Best treated as a contrarian alert rather than a standalone reversal call.', norm: 'fires when max |meanReversion| crosses the extreme threshold', range: 'transition event', level: 'Asset-level trigger' },
          'efficiency-anomaly':  { id: 'T9', name: 'Efficiency Anomaly', desc: 'The market-efficiency signal crossed a threshold, meaning Up and Down token prices drifted materially away from summing to 1.0.', why: 'Binary markets that stop adding cleanly to 1.0 may contain stale quotes or temporary arbitrage noise.', interpret: 'Use it as a market-quality warning and as supporting evidence for pricing dislocations.', norm: 'fires when |marketEfficiency| crosses the anomaly threshold', range: 'transition event', level: 'Window-level trigger' },
          'liquidity-shift':     { id: 'T10', name: 'Liquidity Shift', desc: 'Aggregate exchange book depth crossed a notable threshold, indicating liquidity became materially thinner or deeper.', why: 'Liquidity regime changes alter how easily the price can move and how much slippage you should expect.', interpret: 'Thin books increase fragility; deeper books reduce immediate move sensitivity.', norm: 'fires when |bookDepth| crosses the liquidity threshold', range: 'transition event', level: 'Asset-level trigger' },
        },

        regimeInfo: {
          'trending-up': {
            id: 'R1',
            name: 'Trending Up',
            desc: 'The asset is in a sustained uptrend across multiple time horizons. Momentum is positive and consistent.',
            why: 'Trending assets tend to continue moving in the same direction. In binary markets, this bias can be exploited while the trend persists.',
            interpret: 'Up-sided positions have an edge. Consider exiting if the regime shifts to flat or down.',
            norm: 'weighted average of momentum horizons (30s: 1.0, 2m: 0.7, 5m: 0.4) ≥ 0.3',
            range: 'direction regime',
            level: 'Asset-level (uses momentum signal)',
            thresholds: 'Enters at momentum ≥ +0.3, exits at momentum < +0.3'
          },
          'trending-down': {
            id: 'R2',
            name: 'Trending Down',
            desc: 'The asset is in a sustained downtrend across multiple time horizons. Momentum is negative and consistent.',
            why: 'Downtrends often persist due to cascading sell pressure or negative news flow.',
            interpret: 'Down-sided positions have an edge. Consider exiting if the regime shifts to flat or up.',
            norm: 'weighted average of momentum horizons (30s: 1.0, 2m: 0.7, 5m: 0.4) ≤ -0.3',
            range: 'direction regime',
            level: 'Asset-level (uses momentum signal)',
            thresholds: 'Enters at momentum ≤ -0.3, exits at momentum > -0.3'
          },
          'flat': {
            id: 'R3',
            name: 'Flat / Range-bound',
            desc: 'The asset is oscillating without clear directional bias. Momentum is near zero across horizons.',
            why: 'Range-bound markets favor mean-reversion strategies. Directional signals are less reliable.',
            interpret: 'Avoid directional bets or use smaller sizes. Look for range exits before entering trending positions.',
            norm: 'weighted momentum average between -0.3 and +0.3',
            range: 'direction regime',
            level: 'Asset-level (uses momentum signal)',
            thresholds: 'Enters when -0.3 < momentum < +0.3, exits outside this band'
          },
          'high': {
            id: 'R4',
            name: 'High Volatility',
            desc: 'Short-term volatility is significantly elevated compared to long-term baseline. Price swings are amplified.',
            why: 'High vol regimes often follow news events or breakouts. Directional signals are stronger but risk is higher.',
            interpret: 'Momentum signals are more reliable. Consider larger position sizes but tighter stops. Avoid mean-reversion strategies.',
            norm: 'volatility regime signal (short/long vol ratio) ≥ 0.4',
            range: 'volatility regime',
            level: 'Asset-level (uses volatilityRegime signal)',
            thresholds: 'Enters at vol-ratio ≥ +0.4, exits at vol-ratio < +0.4'
          },
          'normal': {
            id: 'R5',
            name: 'Normal Volatility',
            desc: 'Volatility is at baseline levels. Short-term and long-term volatility are in balance.',
            why: 'Normal vol is the default state. Most trading strategies assume these conditions.',
            interpret: 'Standard risk parameters apply. No vol-related edge in either direction.',
            norm: 'volatility regime signal between -0.4 and +0.4',
            range: 'volatility regime',
            level: 'Asset-level (uses volatilityRegime signal)',
            thresholds: 'Default state when -0.4 < vol-ratio < +0.4'
          },
          'low': {
            id: 'R6',
            name: 'Low Volatility',
            desc: 'Short-term volatility is compressed. Price movements are dampened, often precedes expansion.',
            why: 'Low vol often precedes breakouts. Mean-reversion strategies tend to outperform in compression regimes.',
            interpret: 'Prefer mean-reversion over momentum. Low vol can be a precursor to large moves—watch for regime change.',
            norm: 'volatility regime signal (short/long vol ratio) ≤ -0.4',
            range: 'volatility regime',
            level: 'Asset-level (uses volatilityRegime signal)',
            thresholds: 'Enters at vol-ratio ≤ -0.4, exits at vol-ratio > -0.4'
          }
        },

        start() {
          this.poll();
          setInterval(() => this.poll(), 1000);
        },

        async poll() {
          try {
            const res = await fetch('/api/signals/structured');
            if (res.ok) {
              const json = await res.json();
              this.processTriggers(json.triggers || []);
              this.processRegimeEvents(json.regimeEvents || []);
              this.data = json;
              this.connected = true;
              this.lastUpdate = new Date().toLocaleTimeString();
            } else { this.connected = false; }
          } catch { this.connected = false; }
        },

        processTriggers(newTriggers) {
          const now = Date.now();
          for (const t of newTriggers) {
            const key = t.id + '_' + t.asset + '_' + (t.window || '_asset');
            const isExisting = this.activeTriggers.some(at => at.key === key);
            if (!isExisting) {
              this.activeTriggers.push({ ...t, key, addedAt: now });
              setTimeout(() => {
                this.activeTriggers = this.activeTriggers.filter(at => at.key !== key);
              }, 8000);
            }
          }
        },

        processRegimeEvents(newEvents) {
          const now = Date.now();
          for (const e of newEvents) {
            const key = e.id + '_' + e.asset;
            const isExisting = this.activeTriggers.some(at => at.key === key);
            if (!isExisting) {
              this.activeTriggers.push({
                ...e,
                key,
                addedAt: now,
                label: e.label,
                severity: e.severity,
                asset: e.asset,
                window: null
              });
              setTimeout(() => {
                this.activeTriggers = this.activeTriggers.filter(at => at.key !== key);
              }, 8000);
            }
          }
        },

        getAssetTriggers(asset) {
          return this.activeTriggers.filter(t => t.asset === asset && t.window === null);
        },

        getWindowTriggers(asset, win) {
          return this.activeTriggers.filter(t => t.asset === asset && t.window === win);
        },

        openInfo(key) {
          this.modalType = 'signal';
          this.modalKey = key;
        },

        openTriggerInfo(key) {
          this.modalType = 'trigger';
          this.modalKey = key;
        },

        openRegimeInfo(asset, regimeType) {
          this.modalType = 'regime';
          this.modalKey = regimeType;
          this.modalAsset = asset;
        },

        getModalInfo() {
          if (this.modalType === 'regime') {
            const regime = this.getRegime(this.modalAsset);
            if (!regime) return null;
            const key = this.modalKey === 'direction' ? regime.direction : regime.volatility;
            const info = this.regimeInfo[key] || null;
            if (!info) return null;
            // Add current value to the info object
            const currentValue = this.modalKey === 'direction'
              ? this.computeAverageMomentum(this.modalAsset)
              : this.getAssetVal(this.modalAsset, 'volatilityRegime');
            return { ...info, currentValue, asset: this.modalAsset };
          }
          const source = this.modalType === 'trigger' ? this.triggerInfo : this.sigInfo;
          return source[this.modalKey] || null;
        },

        computeAverageMomentum(asset) {
          const obj = this.data?.[asset]?.signals?.['momentum'];
          if (!obj || typeof obj !== 'object') return null;
          let sumWeighted = 0, sumWeights = 0;
          const weights = { '30s': 1.0, '2m': 0.7, '5m': 0.4 };
          for (const [h, v] of Object.entries(obj)) {
            if (typeof v === 'number' && weights[h]) {
              sumWeighted += v * weights[h];
              sumWeights += weights[h];
            }
          }
          return sumWeights > 0 ? (sumWeighted / sumWeights).toFixed(3) : null;
        },

        getChainlink(asset) { return this.data?.[asset]?.chainlinkPrice ?? null; },

        getAssetVal(asset, key) {
          const v = this.data?.[asset]?.signals?.[key];
          return (typeof v === 'number') ? v : null;
        },

        getAssetHorizon(asset, signalKey, horizonKey) {
          const obj = this.data?.[asset]?.signals?.[signalKey];
          if (!obj || typeof obj !== 'object') return null;
          const v = obj[horizonKey];
          return (typeof v === 'number') ? v : null;
        },

        getHorizonKeys(asset, signalKey) {
          const obj = this.data?.[asset]?.signals?.[signalKey];
          if (!obj || typeof obj !== 'object') return [];
          return Object.keys(obj);
        },

        getWinVal(asset, win, key) {
          const v = this.data?.[asset]?.windows?.[win]?.signals?.[key];
          return (typeof v === 'number') ? v : null;
        },

        getWinPrice(asset, win, key) {
          const v = this.data?.[asset]?.windows?.[win]?.prices?.[key];
          return (typeof v === 'number') ? v : null;
        },

        fmt(v) {
          if (v === null || v === undefined) return '\u2014';
          return (v >= 0 ? '+' : '') + v.toFixed(3);
        },

        fmtPrice(v) {
          if (v === null || v === undefined) return '\u2014';
          if (v >= 1000) return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          if (v >= 1) return '$' + v.toFixed(4);
          return '$' + v.toFixed(6);
        },

        fmtToken(v) {
          if (v === null || v === undefined) return '\u2014';
          return v.toFixed(2);
        },

        valColor(v) {
          if (v === null || v === undefined) return 'var(--text-muted)';
          if (v > 0.5) return 'var(--green-strong)';
          if (v > 0.15) return 'var(--green-mid)';
          if (v < -0.5) return 'var(--red-strong)';
          if (v < -0.15) return 'var(--red-mid)';
          return 'var(--text-secondary)';
        },

        cellBg(v) {
          if (v === null || v === undefined) return '';
          if (v > 0.3) return 'background: var(--green-faint)';
          if (v < -0.3) return 'background: var(--red-faint)';
          return '';
        },

        chipStyle(v) {
          let bg = 'var(--bg-card)'; let color = 'var(--text-muted)';
          if (typeof v === 'number') {
            color = this.valColor(v);
            if (v > 0.15) bg = 'var(--green-faint)';
            else if (v < -0.15) bg = 'var(--red-faint)';
          }
          return 'background:' + bg + '; color:' + color;
        },

        getProgress(asset, win) {
          const startMs = this.data?.[asset]?.windows?.[win]?.prices?.marketStartMs;
          const endMs = this.data?.[asset]?.windows?.[win]?.prices?.marketEndMs;
          if (typeof startMs !== 'number' || typeof endMs !== 'number' || endMs <= startMs) return null;
          const now = Date.now();
          const elapsed = now - startMs;
          const total = endMs - startMs;
          return { pct: Math.max(0, Math.min(1, elapsed / total)), remainMs: Math.max(0, endMs - now) };
        },

        progressPct(asset, win) {
          const p = this.getProgress(asset, win);
          if (!p) return '\u2014';
          return Math.round(p.pct * 100) + '%';
        },

        timeRemaining(asset, win) {
          const p = this.getProgress(asset, win);
          if (!p) return '\u2014';
          const sec = Math.ceil(p.remainMs / 1000);
          if (sec >= 60) return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's left';
          return sec + 's left';
        },

        progressStyle(asset, win) {
          const p = this.getProgress(asset, win);
          if (!p) return 'width:0';
          const pct = Math.round(p.pct * 100);
          const color = pct > 90 ? 'var(--red-mid)' : pct > 70 ? 'var(--yellow)' : 'var(--accent)';
          return 'width:' + pct + '%; background:' + color;
        },

        barStyle(v) {
          if (v === null || v === undefined) return 'width:0';
          const pct = Math.abs(v) * 50;
          const left = v >= 0 ? 50 : 50 - pct;
          const color = v >= 0 ? 'var(--green-mid)' : 'var(--red-mid)';
          return 'left:' + left + '%; width:' + pct + '%; background:' + color;
        },

        // Regime helper functions
        getRegime(asset) {
          return this.data?.regimes?.[asset] ?? null;
        },

        regimeDirectionLabel(asset) {
          const regime = this.getRegime(asset);
          if (!regime) return '---';
          switch (regime.direction) {
            case 'trending-up': return '▲ UP';
            case 'trending-down': return '▼ DOWN';
            case 'flat': return '◀▶ FLAT';
          }
        },

        regimeDirectionClass(asset) {
          const regime = this.getRegime(asset);
          if (!regime) return 'regime-direction-flat';
          switch (regime.direction) {
            case 'trending-up': return 'regime-direction-up';
            case 'trending-down': return 'regime-direction-down';
            case 'flat': return 'regime-direction-flat';
          }
        },

        regimeVolatilityLabel(asset) {
          const regime = this.getRegime(asset);
          if (!regime) return '---';
          switch (regime.volatility) {
            case 'high': return '⚡ HIGH';
            case 'normal': return '◉ NORM';
            case 'low': return '– LOW';
          }
        },

        regimeVolatilityClass(asset) {
          const regime = this.getRegime(asset);
          if (!regime) return 'regime-vol-normal';
          switch (regime.volatility) {
            case 'high': return 'regime-vol-high';
            case 'normal': return 'regime-vol-normal';
            case 'low': return 'regime-vol-low';
          }
        }
      };
    }
  </script>
</body>
</html>
