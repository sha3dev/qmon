<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QMON Signals</title>
  <style>
    body {
      margin: 0;
      font-family: "Iosevka", "IBM Plex Mono", monospace;
      background: #091019;
      color: #edf6ff;
      padding: 24px;
    }
    a { color: #f4b942; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 16px;
      border-radius: 14px;
      background: #111c28;
      border: 1px solid #294055;
      max-height: calc(100vh - 140px);
      overflow: auto;
    }
  </style>
</head>
<body>
  <p><a href="/">Back to dashboard</a></p>
  <h1>Structured signals</h1>
  <pre id="payload">Loading…</pre>
  <script>
    async function refreshSignals() {
      const response = await fetch("/api/signals/structured");
      const payload = await response.json();
      document.getElementById("payload").textContent = JSON.stringify(payload, null, 2);
    }

    refreshSignals();
    setInterval(refreshSignals, 2000);
  </script>
</body>
</html>
